<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/normalize.min.css">
  <link rel="stylesheet" href="css/fonts.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@6.1/dist/fancybox/fancybox.css" />
  <title>Document</title>
</head>

<body>
  <header class="header">
    <div class="header__top">
      <div class="container header__inner">
        <a class="header__logo logo" href="#">
          <img src="/images/logo.svg" alt="Logo">
        </a>
        <nav class="header__nav">
          <ul class="header__nav-list">
            <li class="header__nav-item">
              <a class="header__nav-link" href="#">About Us</a>
            </li>
            <li class="header__nav-item">
              <a class="header__nav-link" href="#">Courses</a>
            </li>
            <li class="header__nav-item">
              <a class="header__nav-link" href="#">Events</a>
            </li>
            <li class="header__nav-item">
              <a class="header__nav-link" href="#">Blog</a>
            </li>
            <li class="header__nav-item">
              <a class="header__nav-link" href="#">Contacts</a>
            </li>
          </ul>
        </nav>
        <div class="header__btn-box">
          <a class="header__top-btn button" href="#">Get consultation</a>
          <div class="header__user-nav">
            <a class="header__user-btn" href="#">Log in</a>
            /
            <a class="header__user-btn" href="#">Register</a>
          </div>
        </div>
      </div>
    </div>
    <div class="header__body">
      <div class="container header__body-inner">
        <div class="header__body-content">
          <a class="header__play" id="trigger" href="#">
            <div class="header__play-icon"><img src="images/icons/play-icon.svg" alt=""></div>
            Play showreel
          </a>
          <h1 class="header__title">Enjoy studying
            with Createx Online Courses</h1>
          <div class="header__content-buttons">
            <a class="header__content-btn button--empty">About us</a>
            <a class="header__content-btn button">Explore courses</a>
          </div>
        </div>
        <img src="images/hero-illustration.svg" alt="">
      </div>
    </div>
    <div class="header__row">
      <div class="container">
        <ul class="header__row-list">
          <li class="header__row-item">
            <span class="header__row-item-number">1200</span>
            <span class="header__row-item-text">Students graduated</span>
          </li>
          <span></span>
          <li class="header__row-item">
            <span class="header__row-item-number">84</span>
            <span class="header__row-item-text">Completed courses</span>
          </li>
          <span></span>
          <li class="header__row-item">
            <span class="header__row-item-number">16</span>
            <span class="header__row-item-text">Qualified tutors</span>
          </li>
          <span></span>
          <li class="header__row-item">
            <span class="header__row-item-number">5</span>
            <span class="header__row-item-text">Years of experience</span>
          </li>
        </ul>
      </div>
    </div>
  </header>

</body>
<script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@6.1/dist/fancybox/fancybox.umd.js"></script>
<script>
  document.getElementById("trigger").addEventListener("click", () => {
    Fancybox.show(
      [
        {
          src: "images/video.mp4",
          width: 640,
          height: 360,
        },
      ],
      {
        Carousel: {
          Video: {
            autoplay: true,
          },
        },
      }
    );
  });
</script>

</html>
